<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Toko Online (Simpel)</title>
  <style>
    body {
      font-family: sans-serif;
      background: #f0f4f8;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    .login-box, .dashboard-box {
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
      text-align: center;
    }
    input {
      display: block;
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      border: 1px solid #ccc;
      border-radius: 6px;
    }
    button {
      background: #4f46e5;
      color: white;
      border: none;
      padding: 12px 20px;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
      width: 100%;
    }
    .error { color: red; margin-top: 10px; }
  </style>
</head>
<body>

  <!-- Tampilan Login -->
  <div id="loginPage">
    <div class="login-box">
      <h2>Login Toko Online</h2>
      <input type="text" id="username" placeholder="Username">
      <input type="password" id="password" placeholder="Password">
      <button onclick="login()">Masuk</button>
      <div id="errorMsg" class="error"></div>
      <p style="margin-top:15px; font-size:0.9em; color:#666;">
        Coba: superadmin / admin123
      </p>
    </div>
  </div>

  <!-- Tampilan Setelah Login -->
  <div id="dashboardPage" style="display:none;">
    <div class="dashboard-box">
      <h2>Selamat datang, <span id="userRoleSpan"></span>!</h2>
      <p id="infoText"></p>
      <button onclick="logout()" style="background:#e53e3e;">Logout</button>
    </div>
  </div>

  <script>
    // Data user sementara (hardcode)
    const users = [
      { username: 'superadmin', password: 'admin123', role: 'Superadmin' },
      { username: 'pelanggan1', password: 'pelanggan123', role: 'Pelanggan' },
      { username: 'toko1', password: 'toko123', role: 'Pemilik Toko' },
      { username: 'staff1', password: 'staff123', role: 'Staf' },
      { username: 'ojeg1', password: 'ojeg123', role: 'Tukang Ojeg' }
    ];

    function login() {
      const uname = document.getElementById('username').value.trim();
      const pass = document.getElementById('password').value;
      const errorDiv = document.getElementById('errorMsg');
      errorDiv.textContent = '';

      const found = users.find(u => u.username === uname && u.password === pass);
      if (found) {
        // Simpan di localStorage
        localStorage.setItem('loggedUser', JSON.stringify(found));
        // Tampilkan dashboard
        document.getElementById('loginPage').style.display = 'none';
        document.getElementById('dashboardPage').style.display = 'block';
        document.getElementById('userRoleSpan').textContent = found.role;
        document.getElementById('infoText').textContent = 'Fitur dashboard akan segera hadir.';
      } else {
        errorDiv.textContent = 'Username atau password salah!';
      }
    }

    function logout() {
      localStorage.removeItem('loggedUser');
      document.getElementById('loginPage').style.display = 'block';
      document.getElementById('dashboardPage').style.display = 'none';
      document.getElementById('username').value = '';
      document.getElementById('password').value = '';
    }

    // Cek jika sudah login sebelumnya
    (function() {
      const saved = localStorage.getItem('loggedUser');
      if (saved) {
        const user = JSON.parse(saved);
        document.getElementById('loginPage').style.display = 'none';
        document.getElementById('dashboardPage').style.display = 'block';
        document.getElementById('userRoleSpan').textContent = user.role;
        document.getElementById('infoText').textContent = 'Fitur dashboard akan segera hadir.';
      }
    })();
  </script>

</body>
</html>
