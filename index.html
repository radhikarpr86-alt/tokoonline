<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Superadmin Dashboard - Toko Online</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #f7fafc;
      display: flex;
      min-height: 100vh;
    }
    .sidebar {
      width: 250px;
      background: #2d3748;
      color: white;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 30px;
    }
    .sidebar h2 {
      font-size: 1.5rem;
      text-align: center;
      margin-bottom: 10px;
    }
    .sidebar ul {
      list-style: none;
      flex-grow: 1;
    }
    .sidebar ul li {
      margin-bottom: 8px;
    }
    .sidebar ul li a {
      color: #cbd5e0;
      text-decoration: none;
      display: block;
      padding: 10px 15px;
      border-radius: 8px;
      transition: background 0.3s;
    }
    .sidebar ul li a.active,
    .sidebar ul li a:hover {
      background: #4a5568;
      color: white;
    }
    .logout-btn {
      background: #e53e3e;
      color: white;
      border: none;
      padding: 12px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
    }
    .main-content {
      flex: 1;
      padding: 30px;
      overflow-y: auto;
    }
    .card {
      background: white;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.05);
      margin-bottom: 20px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 15px;
    }
    th, td {
      border: 1px solid #e2e8f0;
      padding: 10px;
      text-align: left;
    }
    th {
      background: #edf2f7;
    }
    button {
      padding: 6px 12px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
    }
    .btn-approve {
      background: #48bb78;
      color: white;
    }
    .btn-suspend {
      background: #ecc94b;
      color: black;
    }
    .btn-unsuspend {
      background: #4299e1;
      color: white;
    }
    .alert {
      padding: 10px;
      border-radius: 6px;
      margin-bottom: 15px;
    }
    .alert-info {
      background: #bee3f8;
      color: #2b6cb0;
    }
    .hidden {
      display: none;
    }
    .nav-menu {
      display: flex;
      gap: 15px;
      margin-bottom: 20px;
    }
    .nav-menu button {
      background: transparent;
      border: 2px solid #a0aec0;
      color: #4a5568;
    }
    .nav-menu button.active {
      background: #4299e1;
      color: white;
      border-color: #4299e1;
    }
  </style>
</head>
<body>
  <div class="sidebar">
    <h2>🛡️ Superadmin</h2>
    <ul>
      <li><a href="#" class="active" data-page="dashboard">📊 Dashboard</a></li>
      <li><a href="#" data-page="users">👥 Manajemen User</a></li>
      <li><a href="#" data-page="laporan">📋 Laporan Riwayat</a></li>
    </ul>
    <button class="logout-btn" onclick="logout()">🚪 Logout</button>
  </div>

  <div class="main-content" id="mainContent">
    <!-- Konten dinamis -->
  </div>

  <script>
    // Cek otorisasi
    const userRole = localStorage.getItem('user_role');
    if (userRole !== 'superadmin') {
      alert('Akses ditolak. Hanya superadmin yang bisa mengakses halaman ini.');
      window.location.href = '/index.html';
    }

    // Data dummy user (nantinya dari API)
    let dummyUsers = [
      { id: 1, username: 'superadmin', role: 'superadmin', is_approved: true, is_suspended: false },
      { id: 2, username: 'pelanggan1', role: 'customer', is_approved: true, is_suspended: false },
      { id: 3, username: 'toko1', role: 'seller', is_approved: true, is_suspended: false },
      { id: 4, username: 'staff1', role: 'staff', is_approved: true, is_suspended: false },
      { id: 5, username: 'codseller1', role: 'cod_seller', is_approved: false, is_suspended: false },
      { id: 6, username: 'ojeg1', role: 'driver', is_approved: true, is_suspended: false },
      { id: 7, username: 'codseller2', role: 'cod_seller', is_approved: false, is_suspended: false },
      { id: 8, username: 'ojeg2', role: 'driver', is_approved: false, is_suspended: false },
    ];

    // Data dummy laporan (contoh)
    const dummyLaporan = [
      { id: 1, pesanan: 'Pesanan #1', toko: 'Toko A', total_produk: 50000, ongkir: 10000, komisi: 1000, status: 'Selesai' },
      { id: 2, pesanan: 'Pesanan #2', toko: 'Toko B', total_produk: 75000, ongkir: 15000, komisi: 1500, status: 'Disetujui Ojeg' },
    ];

    // Simpan data user di localStorage agar perubahan tersimpan selama sesi (opsional)
    if (!localStorage.getItem('dummyUsers')) {
      localStorage.setItem('dummyUsers', JSON.stringify(dummyUsers));
    } else {
      dummyUsers = JSON.parse(localStorage.getItem('dummyUsers'));
    }

    const mainContent = document.getElementById('mainContent');
    const navLinks = document.querySelectorAll('.sidebar a[data-page]');

    // Fungsi render halaman
    function renderDashboard() {
      const totalUser = dummyUsers.length;
      const pending = dummyUsers.filter(u => !u.is_approved).length;
      const suspended = dummyUsers.filter(u => u.is_suspended).length;
      mainContent.innerHTML = `
        <h1>Dashboard Superadmin</h1>
        <div class="alert alert-info">Selamat datang, Superadmin. Kelola aplikasi dari sini.</div>
        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px;">
          <div class="card">
            <h3>Total User</h3>
            <p style="font-size: 2rem; font-weight: bold;">${totalUser}</p>
          </div>
          <div class="card">
            <h3>Pending Persetujuan</h3>
            <p style="font-size: 2rem; font-weight: bold;">${pending}</p>
          </div>
          <div class="card">
            <h3>User Dinonaktifkan</h3>
            <p style="font-size: 2rem; font-weight: bold;">${suspended}</p>
          </div>
        </div>
      `;
    }

    function renderManajemenUser() {
      const userRows = dummyUsers.map(user => `
        <tr>
          <td>${user.id}</td>
          <td>${user.username}</td>
          <td>${user.role}</td>
          <td>${user.is_approved ? '✅' : '⏳'}</td>
          <td>${user.is_suspended ? '❌' : '✅'}</td>
          <td>
            ${!user.is_approved && (user.role === 'cod_seller' || user.role === 'driver') ? 
              `<button class="btn-approve" onclick="approveUser(${user.id})">Setujui</button>` : ''}
            ${!user.is_suspended ? 
              `<button class="btn-suspend" onclick="suspendUser(${user.id})">Nonaktifkan</button>` :
              `<button class="btn-unsuspend" onclick="unsuspendUser(${user.id})">Aktifkan</button>`}
          </td>
        </tr>
      `).join('');

      mainContent.innerHTML = `
        <h1>Manajemen User</h1>
        <p>Daftar semua akun terdaftar. Superadmin dapat menyetujui atau menonaktifkan akun.</p>
        <div class="card">
          <table>
            <thead>
              <tr>
                <th>ID</th>
                <th>Username</th>
                <th>Role</th>
                <th>Disetujui?</th>
                <th>Status</th>
                <th>Aksi</th>
              </tr>
            </thead>
            <tbody>
              ${userRows}
            </tbody>
          </table>
        </div>
      `;
    }

    function renderLaporan() {
      let laporanRows = dummyLaporan.map(l => `
        <tr>
          <td>${l.id}</td>
          <td>${l.pesanan}</td>
          <td>${l.toko}</td>
          <td>Rp ${l.total_produk.toLocaleString()}</td>
          <td>Rp ${l.ongkir.toLocaleString()}</td>
          <td>Rp ${l.komisi.toLocaleString()}</td>
          <td>${l.status}</td>
        </tr>
      `).join('');

      mainContent.innerHTML = `
        <h1>Laporan Riwayat Transaksi & Komisi</h1>
        <div class="card">
          <table>
            <thead>
              <tr>
                <th>ID Laporan</th>
                <th>Pesanan</th>
                <th>Toko</th>
                <th>Total Produk</th>
                <th>Ongkir</th>
                <th>Komisi</th>
                <th>Status</th>
              </tr>
            </thead>
            <tbody>
              ${laporanRows}
            </tbody>
          </table>
          <p style="margin-top: 15px; color: #718096;"><i>* Data ini contoh statis, nanti akan live dari backend.</i></p>
        </div>
      `;
    }

    // Fungsi aksi
    function approveUser(id) {
      const index = dummyUsers.findIndex(u => u.id === id);
      if (index !== -1) {
        dummyUsers[index].is_approved = true;
        localStorage.setItem('dummyUsers', JSON.stringify(dummyUsers));
        alert('Akun berhasil disetujui!');
        renderManajemenUser(); // refresh tabel
      }
    }

    function suspendUser(id) {
      if (confirm('Nonaktifkan akun ini?')) {
        const index = dummyUsers.findIndex(u => u.id === id);
        if (index !== -1) {
          dummyUsers[index].is_suspended = true;
          localStorage.setItem('dummyUsers', JSON.stringify(dummyUsers));
          renderManajemenUser();
        }
      }
    }

    function unsuspendUser(id) {
      if (confirm('Aktifkan kembali akun ini?')) {
        const index = dummyUsers.findIndex(u => u.id === id);
        if (index !== -1) {
          dummyUsers[index].is_suspended = false;
          localStorage.setItem('dummyUsers', JSON.stringify(dummyUsers));
          renderManajemenUser();
        }
      }
    }

    function logout() {
      localStorage.removeItem('auth_token');
      localStorage.removeItem('user_role');
      localStorage.removeItem('user_id');
      window.location.href = '/index.html';
    }

    // Navigasi sidebar
    navLinks.forEach(link => {
      link.addEventListener('click', function(e) {
        e.preventDefault();
        // Hapus class active semua
        navLinks.forEach(l => l.classList.remove('active'));
        this.classList.add('active');
        const page = this.dataset.page;
        switch(page) {
          case 'dashboard':
            renderDashboard();
            break;
          case 'users':
            renderManajemenUser();
            break;
          case 'laporan':
            renderLaporan();
            break;
          default:
            renderDashboard();
        }
      });
    });

    // Render dashboard pertama kali
    renderDashboard();

    // Ekspose fungsi global
    window.approveUser = approveUser;
    window.suspendUser = suspendUser;
    window.unsuspendUser = unsuspendUser;
  </script>
</body>
</html>
