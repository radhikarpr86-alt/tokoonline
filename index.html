<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Masuk - Toko Online App</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .login-container {
      background: white;
      border-radius: 20px;
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
      padding: 40px 30px;
      width: 100%;
      max-width: 420px;
      animation: fadeIn 0.6s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .login-header {
      text-align: center;
      margin-bottom: 30px;
    }

    .login-header h1 {
      font-size: 1.8rem;
      color: #2d3748;
      margin-bottom: 5px;
    }

    .login-header p {
      color: #718096;
      font-size: 0.95rem;
    }

    .input-group {
      margin-bottom: 20px;
      position: relative;
    }

    .input-group label {
      display: block;
      margin-bottom: 6px;
      font-weight: 600;
      color: #4a5568;
      font-size: 0.9rem;
    }

    .input-group input {
      width: 100%;
      padding: 12px 15px;
      padding-left: 45px;
      border: 2px solid #e2e8f0;
      border-radius: 10px;
      font-size: 1rem;
      transition: border 0.3s;
      outline: none;
    }

    .input-group input:focus {
      border-color: #4facfe;
    }

    .input-group .icon {
      position: absolute;
      left: 15px;
      top: 38px;
      color: #a0aec0;
      font-size: 1.2rem;
    }

    .btn-login {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border: none;
      border-radius: 10px;
      color: white;
      font-size: 1.1rem;
      font-weight: bold;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      margin-top: 10px;
    }

    .btn-login:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
    }

    .btn-login:active {
      transform: translateY(0);
    }

    .forgot-link {
      display: block;
      text-align: right;
      margin-top: 8px;
      margin-bottom: 5px;
    }

    .forgot-link a {
      color: #4facfe;
      text-decoration: none;
      font-size: 0.9rem;
      transition: color 0.2s;
    }

    .forgot-link a:hover {
      color: #764ba2;
      text-decoration: underline;
    }

    .alert {
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 15px;
      font-size: 0.9rem;
      display: none;
    }

    .alert-error {
      background: #fff5f5;
      color: #c53030;
      border: 1px solid #feb2b2;
      display: block;
    }

    .alert-success {
      background: #f0fff4;
      color: #276749;
      border: 1px solid #9ae6b4;
    }

    .loading-spinner {
      display: none;
      text-align: center;
      margin-top: 15px;
    }

    .spinner {
      border: 3px solid rgba(255,255,255,.3);
      border-top: 3px solid #764ba2;
      border-radius: 50%;
      width: 25px;
      height: 25px;
      animation: spin 0.8s linear infinite;
      margin: 0 auto;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .register-hint {
      text-align: center;
      margin-top: 20px;
      font-size: 0.9rem;
      color: #718096;
    }

    .register-hint a {
      color: #4facfe;
      text-decoration: none;
      font-weight: 600;
    }

    @media (max-width: 480px) {
      .login-container {
        padding: 25px 20px;
      }
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-header">
      <h1>🔐 Toko Online</h1>
      <p>Masuk ke akun Anda</p>
    </div>

    <div id="alertBox" class="alert"></div>

    <form id="loginForm">
      <div class="input-group">
        <label for="username">Username</label>
        <span class="icon">👤</span>
        <input type="text" id="username" placeholder="Username Anda" required autocomplete="username">
      </div>

      <div class="input-group">
        <label for="password">Password</label>
        <span class="icon">🔑</span>
        <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
      </div>

      <div class="forgot-link">
        <a href="#" id="lupaPasswordLink">Lupa Password?</a>
      </div>

      <button type="submit" class="btn-login" id="loginBtn">Masuk</button>
      <div class="loading-spinner" id="loadingSpinner">
        <div class="spinner"></div>
        <p style="color: #4a5568; margin-top: 10px;">Memeriksa kredensial...</p>
      </div>
    </form>

    <div class="register-hint">
      <p>Belum punya akun? <a href="#" id="registerLink">Daftar di sini</a> (Pelanggan / COD Seller / Jasa Ojeg)</p>
    </div>
  </div>

  <script>
    // Simulasi endpoint API login (nanti ganti dengan URL backend asli)
    const API_BASE_URL = 'https://api.tokoonlinekamu.com'; // Ganti nanti

    const loginForm = document.getElementById('loginForm');
    const alertBox = document.getElementById('alertBox');
    const loadingSpinner = document.getElementById('loadingSpinner');
    const loginBtn = document.getElementById('loginBtn');

    // Sembunyikan alert awal
    alertBox.style.display = 'none';

    loginForm.addEventListener('submit', async function(e) {
      e.preventDefault();

      // Ambil input
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      if (!username || !password) {
        tampilkanAlert('error', 'Username dan password wajib diisi.');
        return;
      }

      // Tampilkan loading
      loginBtn.disabled = true;
      loadingSpinner.style.display = 'block';
      alertBox.style.display = 'none';

      try {
        // Untuk sekarang, kita simulasi login dengan data statis
        // Nanti ganti dengan fetch API ke backend nyata
        const response = await simulateLogin(username, password);

        if (response.success) {
          tampilkanAlert('success', 'Login berhasil! Mengalihkan...');
          // Simpan token/auth info (contoh pakai localStorage)
          localStorage.setItem('auth_token', response.token);
          localStorage.setItem('user_role', response.role);
          localStorage.setItem('user_id', response.user_id);

          // Arahkan ke dashboard sesuai role
          setTimeout(() => {
            redirectByRole(response.role);
          }, 1000);
        } else {
          tampilkanAlert('error', response.message || 'Username atau password salah.');
        }
      } catch (error) {
        tampilkanAlert('error', 'Gagal terhubung ke server. Periksa koneksi.');
        console.error(error);
      } finally {
        loginBtn.disabled = false;
        loadingSpinner.style.display = 'none';
      }
    });

    // Fungsi simulasi login sementara (hapus setelah backend siap)
    async function simulateLogin(username, password) {
      // Data dummy user sesuai role
      const dummyUsers = {
        'superadmin': { password: 'admin123', role: 'superadmin', user_id: 1 },
        'pelanggan1': { password: 'pelanggan123', role: 'customer', user_id: 2 },
        'toko1': { password: 'toko123', role: 'seller', user_id: 3 },
        'staff1': { password: 'staff123', role: 'staff', user_id: 4 },
        'codseller1': { password: 'cod123', role: 'cod_seller', user_id: 5 },
        'ojeg1': { password: 'ojeg123', role: 'driver', user_id: 6 }
      };

      return new Promise((resolve) => {
        setTimeout(() => {
          const user = dummyUsers[username];
          if (user && user.password === password) {
            // Jika user butuh persetujuan dan belum disetujui, tolak (contoh)
            if ((user.role === 'cod_seller' || user.role === 'driver') && username !== 'ojeg1') {
              resolve({ success: false, message: 'Akun Anda belum disetujui oleh admin.' });
            } else {
              resolve({
                success: true,
                token: 'simulated-jwt-token-' + username,
                role: user.role,
                user_id: user.user_id
              });
            }
          } else {
            resolve({ success: false, message: 'Username atau password salah.' });
          }
        }, 800); // simulasi delay network
      });
    }

    // Pengalihan berdasarkan role (halaman dashboard nanti dibuat terpisah)
    function redirectByRole(role) {
      switch(role) {
        case 'superadmin':
          window.location.href = '/dashboard-superadmin.html';
          break;
        case 'customer':
          window.location.href = '/dashboard-pelanggan.html';
          break;
        case 'seller':
          window.location.href = '/dashboard-toko.html';
          break;
        case 'staff':
          window.location.href = '/dashboard-staff.html';
          break;
        case 'cod_seller':
          window.location.href = '/dashboard-codseller.html';
          break;
        case 'driver':
          window.location.href = '/dashboard-ojeg.html';
          break;
        default:
          window.location.href = '/';
      }
    }

    function tampilkanAlert(type, message) {
      alertBox.className = 'alert';
      if (type === 'error') {
        alertBox.classList.add('alert-error');
      } else if (type === 'success') {
        alertBox.classList.add('alert-success');
      }
      alertBox.textContent = message;
      alertBox.style.display = 'block';
    }

    // Link "Lupa Password" (bisa arahkan ke halaman reset atau modal)
    document.getElementById('lupaPasswordLink').addEventListener('click', function(e) {
      e.preventDefault();
      alert('Fitur lupa password akan tersedia setelah integrasi backend.\nSementara hubungi admin.');
    });

    // Link registrasi (untuk pelanggan, cod seller, driver)
    document.getElementById('registerLink').addEventListener('click', function(e) {
      e.preventDefault();
      alert('Halaman pendaftaran akan segera dibuat. Tetap semangat!');
    });
  </script>
</body>
</html>
